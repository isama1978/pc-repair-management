name: PC Repair Management CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: "clave-super-secreta-para-tests"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/test_db"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # O la versión que estés usando
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint (Opcional)
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e